server:
  port: 8082

spring:
  application:
    name: academic-service
  datasource:
    url: jdbc:postgresql://postgres-db:5432/academic_db
    username: clutchadmin
    password: secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true

debug: true