server:
  port: 8082

spring:
  application:
    name: academic-service
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 2
      minimum-idle: 1

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: academic_schema
  flyway:
    enabled: true
    baseline-on-migrate: true
    check-location: false
    schemas: academic_schema

debug: true

gemini:
  api:
    key: ${GEMINI_API_KEY}

academic:
  semester:
    start-date: "2026-01-20"

IDENTITY_SERVICE_URL: ${IDENTITY_SERVICE_URL:http://localhost:8081}
jwt:
  secret: ${JWT_SECRET}