server:
  port: 8083

spring:
  application:
    name: placement-service

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 2
      minimum-idle: 1

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: placement_schema

  flyway:
    enabled: true
    baseline-on-migrate: true
    check-location: false
    schemas: placement_schema

debug: true