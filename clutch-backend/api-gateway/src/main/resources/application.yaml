spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: academy-service
          uri: http://academy-service:8080
          predicates:
            - Path=/api/v1/academic/**
        - id: identity-service
          uri: http://identity-service:8080
          predicates:
            - Path=/api/v1/auth/**